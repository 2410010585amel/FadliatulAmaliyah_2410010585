<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biodata</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Biodata</h2>

    <div class="foto">
      <img src="fotoamel.jpg" width="300px" alt="Foto Profil">
    </div>

    <table>
      <tr>
        <td class="label">Nama Depan</td>
        <td>Fadliatul</td>
        <td class="label">Nama Belakang</td>
        <td>Amaliyah</td>
      </tr>
      <tr>
        <td class="label">Tempat Lahir</td>
        <td>Kotabaru</td>
        <td class="label">Tanggal Lahir</td>
        <td>17 Juli 2005</td>
      </tr>
      <tr>
        <td rowspan="4" class="label">Alamat</td>
        <td class="sub-label">Jalan</td>
        <td colspan="2">Karya sabumi</td>
      </tr>
      <tr>
        <td class="sub-label">Kelurahan</td>
        <td colspan="2">Kayu tangi</td>
      </tr>
      <tr>
        <td class="sub-label">Kecamatan</td>
        <td colspan="2">Banjarmasin Utara</td>
      </tr>
      <tr>
        <td class="sub-label">Kota/Kab</td>
        <td colspan="2">Kota Banjarmasin</td>
      </tr>
      <tr>
        <td class="label">Fakultas</td>
        <td>Teknologi Informasi</td>
        <td class="label">Prodi</td>
        <td>Teknik Informatika</td>
      </tr>
    </table>
  </div>
</body>
</html>
